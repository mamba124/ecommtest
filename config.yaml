llm:
  provider: "ollama"          # "ollama" | "gemini" | "anthropic"
  model: "llama3.2"
  base_url: "http://ollama:11434"
  temperature: 0.1
  max_tokens: 1024

embeddings:
  provider: "ollama"          # "ollama" | "sentence_transformers"
  model: "nomic-embed-text"
  base_url: "http://ollama:11434"
  dimension: 768

chunking:
  strategy: "recursive"       # "recursive" | "fixed" | "semantic"
  chunk_size: 1200            # chars; fits one full API section without mid-concept splits
  chunk_overlap: 200          # ~17% overlap preserves bridging sentences across boundaries
  separators: ["\n\n## ", "\n\n### ", "\n\n", "\n", ". ", " ", ""]  # markdown headings first

retrieval:
  top_k: 10                   # initial retrieval pool
  rerank_top_k: 4             # after reranking, keep this many
  use_hybrid: true            # vector + BM25
  hybrid_alpha: 0.7           # weight for vector score (1-alpha = BM25)
  use_reranker: true
  reranker_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"

vector_store:
  provider: "chromadb"
  host: "chromadb"
  port: 8000
  collection_name: "rag_docs"

cache:
  enabled: true
  ttl: 3600                   # Redis key TTL in seconds (default 1 hour)

agent:
  max_sub_questions: 5
  synthesis_model: null       # null = use llm.model
